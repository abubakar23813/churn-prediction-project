<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Prediction</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

header {
  text-align: center;
  padding: 25px;
  font-size: 30px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  cursor: pointer;
}

input:focus, select:focus {
  outline: none;
  border-color: #2a5298;
  box-shadow: 0 0 5px #2a5298;
}

button {
  margin-top: 25px;
  width: 100%;
  padding: 14px;
  background: #2a5298;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1e3c72;
}

.result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.churn { background: #ff4d4d; color: white; }
.no-churn { background: #4CAF50; color: white; }

</style>
</head>

<body>

<header> Customer Churn Prediction</header>

<div class="container">

<form action="/predict" method="post">

<div class="grid">

<div>
<label>Gender</label>
<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div>
<label>Senior Citizen</label>
<select name="SeniorCitizen">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Partner</label>
<select name="Partner">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Dependents</label>
<select name="Dependents">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Phone Service</label>
<select name="PhoneService">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Paperless Billing</label>
<select name="PaperlessBilling">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div>
<label>Tenure (Months)</label>
<input type="number" name="Tenure" placeholder="Enter months" required>
</div>

<div>
<label>Monthly Charges</label>
<input type="number" name="MonthlyCharges" placeholder="Enter amount" required>
</div>

<div>
<label>Total Charges</label>
<input type="number" name="TotalCharges" placeholder="Enter total" required>
</div>

<div>
<label>CLTV</label>
<input type="number" name="CLTV" placeholder="Customer lifetime value" required>
</div>

<div>
<label>Contract</label>
<select name="Contract">
<option value="Month-to-month">Month</option>
<option value="One year">1 Year</option>
<option value="Two year">2 Year</option>
</select>
</div>

<div>
<label>Internet Service</label>
<select name="InternetService">
<option value="DSL">DSL</option>
<option value="Fiber optic">Fiber</option>
<option value="No">No</option>
</select>
</div>

<div>
<label>Payment Method</label>
<select name="PaymentMethod">
<option value="Electronic check">Electronic</option>
<option value="Mailed check">Mail</option>
<option value="Bank transfer">Bank</option>
<option value="Credit card">Card</option>
</select>
</div>

</div>

<button type="submit">Predict Churn</button>

</form>

{% if prediction_text %}
<div class="result {% if '⚠️' in prediction_text %}churn{% else %}no-churn{% endif %}">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
